services:
  auth-service:
    restart: unless-stopped
    environment:
      DEBUG: "false"

  product-service:
    restart: unless-stopped
    environment:
      DEBUG: "false"

  cart-service:
    restart: unless-stopped
    environment:
      DEBUG: "false"

  recommendation-service:
    restart: unless-stopped
    environment:
      DEBUG: "false"

  order-service:
    restart: unless-stopped
    environment:
      DEBUG: "false"

  tracking-service:
    restart: unless-stopped
    environment:
      DEBUG: "false"

  api-gateway:
    restart: unless-stopped
    environment:
      DEBUG: "false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://13.200.16.11:8000/api}
    restart: unless-stopped
    ports: !override
      - "80:80"
